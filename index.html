<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom DropDown</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="dropdown">
      <button class="dropdown--trigger">
        <span class="dropdown-selected">Select an Item</span>
        <span class="fa-solid fa-angle-down"></span>
      </button>

      <ul class="dropdown--list">
        <li class="dropdown-list-item">Item-1 </li>
        <li class="dropdown-list-item">Item-2 </li>
        <li class="dropdown-list-item">Item-3</li>
        <li class="dropdown-list-item">Item-4</li>
        <li class="dropdown-list-item">Item-5</li>
        <li class="dropdown-list-item">Item-6</li>
      </ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
